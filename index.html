<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthesis Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ffcc;
    --accent2: #ff3cac;
    --accent3: #7b61ff;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --correct: #00ffcc;
    --wrong: #ff3cac;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,255,204,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(123,97,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 60% 10%, rgba(255,60,172,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Progress */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-align: right;
    margin-top: 6px;
  }

  /* Question Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    position: relative;
    animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    border-radius: 16px 16px 0 0;
  }

  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 28px;
    color: var(--text);
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent3);
    background: rgba(123,97,255,0.08);
    transform: translateX(4px);
  }

  .option .letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(0,255,204,0.08);
    animation: correctPulse 0.4s ease;
  }

  .option.correct .letter { color: var(--correct); }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,60,172,0.08);
    animation: wrongShake 0.4s ease;
  }

  .option.wrong .letter { color: var(--wrong); }

  .option:disabled { cursor: default; }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.01); }
    100% { transform: scale(1); }
  }

  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Feedback */
  .feedback {
    margin-top: 18px;
    padding: 12px 16px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    display: none;
  }

  .feedback.show { display: block; animation: fadeIn 0.3s ease; }
  .feedback.correct-fb { background: rgba(0,255,204,0.1); color: var(--correct); border: 1px solid rgba(0,255,204,0.2); }
  .feedback.wrong-fb { background: rgba(255,60,172,0.1); color: var(--wrong); border: 1px solid rgba(255,60,172,0.2); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Next button */
  .next-btn {
    margin-top: 22px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none;
    border-radius: 10px;
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s, transform 0.2s;
  }

  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn.show { display: block; animation: fadeIn 0.3s ease 0.2s both; }

  /* Results */
  .results {
    display: none;
    text-align: center;
    animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .results.show { display: block; }

  .score-ring {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 0 auto 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--surface);
    border: 3px solid var(--border);
  }

  .score-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  .score-num {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .score-denom {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  .result-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .result-msg {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .result-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
    text-align: left;
  }

  .breakdown-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .breakdown-item.c { border-color: rgba(0,255,204,0.3); }
  .breakdown-item.w { border-color: rgba(255,60,172,0.3); }

  .breakdown-item .bi-label { color: var(--muted); margin-bottom: 3px; }
  .breakdown-item.c .bi-val { color: var(--correct); font-size: 18px; font-weight: 700; }
  .breakdown-item.w .bi-val { color: var(--wrong); font-size: 18px; font-weight: 700; }

  .restart-btn {
    padding: 14px 36px;
    background: transparent;
    border: 1px solid var(--accent3);
    border-radius: 10px;
    color: var(--accent3);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: rgba(123,97,255,0.1);
    transform: translateY(-1px);
  }

  /* Start screen */
  .start-screen {
    text-align: center;
    padding: 20px 0;
  }

  .start-screen p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .start-btn {
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none;
    border-radius: 10px;
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }

  .start-btn:hover { opacity: 0.9; transform: translateY(-2px); }

  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    margin-bottom: 28px;
  }

  .waveform span {
    display: block;
    width: 3px;
    border-radius: 2px;
    background: var(--accent3);
    animation: wave 1.2s ease-in-out infinite;
  }

  .waveform span:nth-child(1) { height: 12px; animation-delay: 0s; }
  .waveform span:nth-child(2) { height: 24px; animation-delay: 0.1s; }
  .waveform span:nth-child(3) { height: 36px; animation-delay: 0.2s; }
  .waveform span:nth-child(4) { height: 48px; animation-delay: 0.3s; background: var(--accent); }
  .waveform span:nth-child(5) { height: 56px; animation-delay: 0.4s; background: var(--accent); }
  .waveform span:nth-child(6) { height: 48px; animation-delay: 0.5s; background: var(--accent); }
  .waveform span:nth-child(7) { height: 36px; animation-delay: 0.6s; }
  .waveform span:nth-child(8) { height: 24px; animation-delay: 0.7s; }
  .waveform span:nth-child(9) { height: 12px; animation-delay: 0.8s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  @media (max-width: 480px) {
    .card { padding: 24px 20px; }
    .q-text { font-size: 17px; }
    .option { font-size: 14px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="eyebrow">Sound Design · Music Technology</div>
    <h1>Synthesis Fundamentals</h1>
  </div>

  <!-- Start Screen -->
  <div id="startScreen" class="card">
    <div class="start-screen">
      <div class="waveform">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <p>Test your knowledge of synthesis fundamentals — from ADSR envelopes to FM operators, wavetables, filters, and LFOs.<br><br>10 questions · Multiple choice · Instant results</p>
      <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>
  </div>

  <!-- Quiz Area -->
  <div id="quizArea" style="display:none">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">Question 1 of 10</div>

    <div class="card" id="questionCard">
      <div class="q-number" id="qNumber">QUESTION 01</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsArea" class="card results">
    <div class="score-ring">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-denom" id="scoreDenom">/ 10</div>
    </div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-breakdown">
      <div class="breakdown-item c">
        <div class="bi-label">CORRECT</div>
        <div class="bi-val" id="correctCount">0</div>
      </div>
      <div class="breakdown-item w">
        <div class="bi-label">INCORRECT</div>
        <div class="bi-val" id="wrongCount">0</div>
      </div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">↺ Try Again</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "What does ADSR stand for?",
    options: [
      "Attach, Delay, Sustain, Repeat",
      "Attack, Delay, Suspend, Release",
      "Attack, Decay, Sustain, Release",
      "Attack, Decay, Suspent, Release"
    ],
    correct: 2
  },
  {
    q: "How many harmonics does a sine wave contain?",
    options: ["128", "10", "1", "2"],
    correct: 2
  },
  {
    q: "What kind of harmonics are contained inside a sawtooth wave?",
    options: ["Odd", "Even", "Both odd and even"],
    correct: 2
  },
  {
    q: "What kind of harmonics are contained inside a square wave?",
    options: ["Odd", "Even", "Both odd and even"],
    correct: 0
  },
  {
    q: "In basic FM synthesis there are 2 elements, namely...",
    options: [
      "Carrier and Manipulator",
      "Modulator and Frequency Shifter",
      "Carrier and Modulator",
      "Carrier and Phaser"
    ],
    correct: 2
  },
  {
    q: "In FM synthesis, the source of any given waveform/oscillator comes from an...",
    options: ["Algorithm", "Operator", "Modulator", "Carrier"],
    correct: 1
  },
  {
    q: "In wavetable synthesis, we can use wavetable oscillators to...",
    options: [
      "Alter the timbre of the synth voice output",
      "Alter the frequency of the oscillator output",
      "Alter the harmonics of the synth output",
      "All of the above"
    ],
    correct: 3
  },
  {
    q: "In subtractive synthesis, a low pass filter...",
    options: [
      "Cuts the low end below the filter cutoff",
      "Cuts out high frequencies above the filter cutoff",
      "Cuts the midrange around the filter cutoff",
      "Drops the bass below the filter cutoff"
    ],
    correct: 1
  },
  {
    q: "In subtractive synthesis, a band pass filter...",
    options: [
      "Cuts only frequencies around the cutoff point",
      "Cuts lower and higher frequencies above and below the cutoff point",
      "Allows low frequencies below the cutoff point"
    ],
    correct: 1
  },
  {
    q: "LFO stands for...",
    options: [
      "Loud Frequency Oscillator",
      "Low Frequency Operator",
      "Low Frequency Oscillator"
    ],
    correct: 2
  }
];

const letters = ['A', 'B', 'C', 'D'];
let current = 0;
let score = 0;
let answered = false;

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('qNumber').textContent = `QUESTION ${String(current + 1).padStart(2, '0')}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = `${(current / total) * 100}%`;
  document.getElementById('progressLabel').textContent = `Question ${current + 1} of ${total}`;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';
  nb.textContent = current === questions.length - 1 ? 'See Results →' : 'Next Question →';

  // Re-animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll('.option');
  buttons.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');

  if (index === q.correct) {
    score++;
    buttons[index].classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.textContent = '✓ Correct!';
  } else {
    buttons[index].classList.add('wrong');
    buttons[q.correct].classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.textContent = `✗ Not quite — the correct answer was ${letters[q.correct]}: ${q.options[q.correct]}`;
  }

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  const results = document.getElementById('resultsArea');
  results.classList.add('show');

  const total = questions.length;
  const pct = (score / total) * 100;

  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDenom').textContent = `/ ${total}`;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = total - score;

  let title, msg;
  if (pct === 100) {
    title = '🎛️ Perfect Score!';
    msg = 'Outstanding! You have a mastery-level understanding of synthesis fundamentals.';
  } else if (pct >= 80) {
    title = '🔊 Excellent Work!';
    msg = 'Great understanding of synthesis concepts — just a couple of areas to revisit.';
  } else if (pct >= 60) {
    title = '🎹 Good Effort!';
    msg = "Solid foundations! Review the questions you missed and you'll nail it next time.";
  } else if (pct >= 40) {
    title = '🎚️ Keep Practising';
    msg = "You're building your knowledge — revisit your notes on filters, FM synthesis and LFOs.";
  } else {
    title = '📖 Study Up!';
    msg = "No worries — synthesis takes time. Review the core concepts and give it another go!";
  }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = false;
  document.getElementById('resultsArea').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  loadQuestion();
}
</script>
</body>
</html>
